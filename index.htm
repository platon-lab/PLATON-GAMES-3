<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATON GAMES 3</title>

    <link rel="icon" href="favicon.png" type="image/png">

    <meta name="description" content="Ігри про песиків і котів.">
    <meta name="keywords" content="Ігра,Гра,Тіто,Смартик,Джуніор,Філ,Мілка.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap');

        /* Основні стилі */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #051937, #004d40, #00897b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: white;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 20px;
            user-select: none;
            transition: background 0.2s;
        }

        /* Декоративні елементи */
        .background-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 20s infinite linear;
        }

        .circle:nth-child(1) { width: 300px; height: 300px; left: -50px; top: -50px; }
        .circle:nth-child(2) { width: 500px; height: 500px; right: -100px; bottom: -100px; }
        .circle:nth-child(3) { width: 200px; height: 200px; left: 15%; bottom: 10%; background: rgba(0, 255, 127, 0.1); }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00ff88, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }

        .games-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            animation: fadeInUp 1s ease-out 0.5s backwards;
            position: relative;
        }

        .game-card {
            position: relative;
            width: 350px;
            height: 480px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 4px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 30px 70px rgba(0, 255, 136, 0.3);
            border-color: rgba(0, 255, 136, 0.5);
        }

        /* Ефект розльоту */
        .game-card.scattered {
            pointer-events: none;
            position: fixed;
            z-index: 1000;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 77, 64, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            font-size: 5rem;
            color: #00ff88;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        .play-text {
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* Стилі для глюків та відео */
        #glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            background-size: 100% 3px;
            z-index: 9999;
            display: none;
            pointer-events: none;
            animation: glitch-anim 0.1s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); filter: brightness(1); }
            50% { transform: translate(-5px, 5px); filter: brightness(2) hue-rotate(90deg); }
            100% { transform: translate(5px, -5px); filter: brightness(1); }
        }

        #end-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 10000;
            display: none;
        }

        #end-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .game-card { width: 90vw; height: 120vw; max-width: 350px; max-height: 480px; }
            .header { margin-bottom: 30px; }
        }
    </style>
</head>
<body id="main-body">

    <div class="background-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div id="glitch-overlay"></div>

    <div id="end-video-container">
        <video id="end-video">
            <source src="End.mp4" type="video/mp4">
        </video>
    </div>

    <header class="header">
        <h1>PLATON GAMES 3</h1>
    </header>

    <main class="games-container" id="games-grid">
        <div class="game-card">
            <a href="https://platon-lab.github.io/Frogger-Road/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Frog.png" alt="Frogger Game">
                <div class="play-overlay">
                    <span class="play-icon">制</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>
 
        <div class="game-card">
            <a href="https://platon-lab.github.io/Match-3/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Match.png" alt="Match 3 Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/UNO/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Uno.png" alt="Uno Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Find-the-match/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Find.png" alt="Find the match Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Cups/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Cup.png" alt="Cups Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Aim/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Aim.png" alt="Aim Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Breakout/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Break.png" alt="Breakout Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Knife-hit/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Knife.png" alt="Knife hit Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>

        <div class="game-card">
            <a href="https://platon-lab.github.io/Snake-io/" target="_blank" style="text-decoration: none; color: inherit;">
                <img src="Snake.png" alt="Snake io Game">
                <div class="play-overlay">
                    <span class="play-icon">▶</span>
                    <span class="play-text">ГРАТИ</span>
                </div>
            </a>
        </div>
    </main>  

    <script>
        let clickCount = 0;
        const body = document.getElementById('main-body');
        const cards = document.querySelectorAll('.game-card');
        const glitch = document.getElementById('glitch-overlay');
        const videoContainer = document.getElementById('end-video-container');
        const video = document.getElementById('end-video');

        body.addEventListener('click', (e) => {
            // Рахуємо кліки тільки по порожньому фону (не по картках)
            if (e.target.closest('.game-card') || e.target.closest('header')) return;

            clickCount++;

            if (clickCount === 20) {
                triggerEasterEgg();
            }
        });

        function triggerEasterEgg() {
            // 1. Картки розлітаються
            cards.forEach(card => {
                const randomX = (Math.random() - 0.5) * 2000;
                const randomY = (Math.random() - 0.5) * 2000;
                const randomRotate = (Math.random() - 0.5) * 720;
                
                card.classList.add('scattered');
                card.style.transition = "all 1.5s cubic-bezier(0.5, -0.5, 0.5, 1.5)";
                card.style.transform = `translate(${randomX}px, ${randomY}px) rotate(${randomRotate}deg) scale(0)`;
                card.style.opacity = "0";
            });

            // 2. Глюки екрану
            glitch.style.display = 'block';
            body.style.background = 'black';

            // 3. Через 3 секунди - відео
            setTimeout(() => {
                glitch.style.display = 'none';
                videoContainer.style.display = 'block';
                video.play();
            }, 3000);
        }

        // 4. Після закінчення відео - перехід на сайт
        video.onended = () => {
            window.location.href = "https://platon-lab.github.io/PLATON-GAMES-4/";
        };
    </script>
</body>
</html>
